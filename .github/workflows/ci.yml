name: CI
# v3 - cleaner output, Node 24-compatible actions
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        working-directory: backend
        run: |
          set -o pipefail
          python -m pytest tests/ --ignore=tests/eval/ -v \
            --tb=short 2>&1 | tee pytest-output.log
        env:
          PYTHONPATH: .
          SPLUNK_USERNAME: ${{ secrets.SPLUNK_USERNAME }}
          SPLUNK_PASSWORD: ${{ secrets.SPLUNK_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SPLUNK_HOST: localhost
          SPLUNK_PORT: "8089"
          QDRANT_URL: https://dummy.qdrant.io
          QDRANT_API_KEY: dummy-qdrant-key
          VIRUSTOTAL_API_KEY: dummy-vt-key
          ABUSEIPDB_API_KEY: dummy-abuse-key
          LANGCHAIN_TRACING_V2: "false"

      - name: Write job summary
        if: always()
        working-directory: backend
        run: |
          PYTHON_VER=$(python --version 2>&1)
          RESULT=$(grep -E "passed|failed|error" pytest-output.log 2>/dev/null \
            | tail -1 | sed 's/=//g' | xargs || echo "unavailable")
          echo "## Backend test results" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Python:** ${PYTHON_VER}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Result:** ${RESULT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- *eval/ tests excluded from this run*" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: pytest-output
          path: backend/pytest-output.log
          retention-days: 7

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com

      - name: Write job summary
        if: always()
        run: |
          NODE_VER=$(node --version 2>&1)
          echo "## Frontend build" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Node:** ${NODE_VER}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build completed" >> "$GITHUB_STEP_SUMMARY"
