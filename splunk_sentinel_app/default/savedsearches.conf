# Splunk Sentinel - Saved Searches
# Webhook trigger for autonomous investigations

[Sentinel - AWS Metadata Access Detected]
search = index=botsv3 earliest=0 sourcetype=stream:http dest_ip=169.254.169.254 \
    | stats count by src_ip \
    | where count > 5
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 0
alert.track = 0
description = Detects access to AWS metadata service (169.254.169.254) which \
    indicates potential SSRF attacks or cloud credential theft attempts. \
    Triggers Splunk Sentinel autonomous investigation via webhook.
