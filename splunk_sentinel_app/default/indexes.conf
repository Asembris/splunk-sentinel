# Splunk Sentinel - Custom Indexes
# These indexes are created automatically when the app is installed

[sentinel_findings]
homePath   = $SPLUNK_DB/sentinel_findings/db
coldPath   = $SPLUNK_DB/sentinel_findings/colddb
thawedPath = $SPLUNK_DB/sentinel_findings/thaweddb
maxDataSize = auto
maxHotBuckets = 10
maxWarmDBCount = 300
repFactor = auto

[sentinel_actions]
homePath   = $SPLUNK_DB/sentinel_actions/db
coldPath   = $SPLUNK_DB/sentinel_actions/colddb
thawedPath = $SPLUNK_DB/sentinel_actions/thaweddb
maxDataSize = auto
maxHotBuckets = 10
maxWarmDBCount = 300
repFactor = auto
